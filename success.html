<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>申請已送出 | Request Received</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root { --bg-color: #F7F7F7; --text-color: #111111; --card-bg-color: #FFFFFF; --accent-color: #000000; --gray-text: #767676; --pending-color: #888888; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; padding: 20px; }
    .message-box { background-color: var(--card-bg-color); max-width: 440px; width: 100%; padding: 60px 40px; border-radius: 8px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06); border: 1px solid #E0E0E0; }
    .success-icon { width: 60px; height: 60px; margin: 0 auto 24px; display: block; stroke-width: 2.5; stroke: var(--accent-color); stroke-miterlimit: 10; }
    h1 { font-size: 24px; font-weight: 600; letter-spacing: 1px; margin-bottom: 12px; }
    .important-notice { background: var(--text-color); color: #fff; padding: 16px; border-radius: 4px; font-size: 13px; margin-bottom: 24px; }
    .details { text-align: left; background: #FAFAFA; padding: 24px; border-radius: 4px; font-size: 14px; border: 1px solid #E0E0E0; margin-bottom: 24px; }
    .details span { display: flex; justify-content: space-between; border-bottom: 1px solid #EEEEEE; padding: 8px 0; }
    .back-link { font-weight: 600; border-bottom: 2px solid var(--text-color); text-decoration: none; color: var(--text-color); }
  </style>
</head>
<body>
  <div class="message-box">
    <h1>申請已送出</h1>
    <p style="color:#888; margin-bottom:20px;">狀態：等待審核中</p>
    <div class="important-notice">為確保服務品質，預約將為您保留 15 分鐘。</div>
    <div class="details" id="bookingDetails">讀取雲端資料中...</div>
    <a href="index.html" class="back-link">返回預約首頁</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDhiPBUAghmIW9gSIORULpc4Oe5weQKzfk",
      authDomain: "premium-booking-65161.firebaseapp.com",
      projectId: "premium-booking-65161",
      storageBucket: "premium-booking-65161.firebasestorage.app",
      messagingSenderId: "972827032736",
      appId: "1:972827032736:web:0293d80e7e8843dfb2ddc5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const lastID = localStorage.getItem('lastBookingID');

    if (lastID) {
      const docRef = doc(db, "bookings", lastID);
      getDoc(docRef).then(snap => {
        if (snap.exists()) {
          const b = snap.data();
          document.getElementById('bookingDetails').innerHTML = `
            <span><strong>預約姓名</strong> ${b.name}</span>
            <span><strong>預約日期</strong> ${b.date}</span>
            <span><strong>預約時間</strong> ${b.time}</span>
            <span><strong>服務項目</strong> ${b.purpose}</span>
            ${b.fee ? `<span><strong>預計報價</strong> $${b.fee}</span>` : ''}
          `;
        }
      });
    }
  </script>
</body>
</html>
