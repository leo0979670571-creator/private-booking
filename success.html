<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>申請已送出</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root { --bg-color: #F7F7F7; --text-color: #111111; --card-bg-color: #FFFFFF; --accent-color: #000000; --gray-text: #767676; --pending-color: #888888; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; padding: 20px; }
    .message-box { background-color: var(--card-bg-color); max-width: 440px; width: 100%; padding: 60px 40px; border-radius: 4px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05); border: 1px solid #E0E0E0; }
    h1 { font-size: 24px; font-weight: 800; letter-spacing: 1px; margin-bottom: 12px; }
    .important-notice { background: var(--text-color); color: #fff; padding: 16px; border-radius: 2px; font-size: 13px; margin-bottom: 24px; font-weight: 600; letter-spacing: 1px;}
    .details { text-align: left; background: #FAFAFA; padding: 24px; border-radius: 2px; font-size: 14px; border: 1px solid #E0E0E0; margin-bottom: 30px; }
    .details span { display: flex; justify-content: space-between; border-bottom: 1px solid #EEEEEE; padding: 10px 0; }
    .details span strong { font-weight: 700; color: #555; }
    .back-link { font-weight: 700; border-bottom: 2px solid var(--text-color); text-decoration: none; color: var(--text-color); padding-bottom: 4px; letter-spacing: 1px;}
  </style>
</head>
<body>
  <div class="message-box">
    <h1>申請已送出</h1>
    <p style="color:#888; margin-bottom:24px; font-weight:600; font-size:13px; letter-spacing:2px;">目前狀態：審核中</p>
    <div class="important-notice">為確保您的專屬服務品質，預約時段將為您保留 15 分鐘。</div>
    <div class="details" id="bookingDetails">
      </div>
    <a href="index.html" class="back-link">返回預約首頁</a>
  </div>

  <script>
    // 瞬間從本地記憶體抓取剛才填寫的資料，不需要等網路連線
    const b = JSON.parse(localStorage.getItem('latestBookingData'));
    if (b) {
      document.getElementById('bookingDetails').innerHTML = `
        <span><strong>預約姓名</strong> <span>${b.name}</span></span>
        <span><strong>預約日期</strong> <span>${b.date}</span></span>
        <span><strong>預約時間</strong> <span>${b.time}</span></span>
        <span><strong>服務項目</strong> <span style="text-align:right; max-width:60%;">${b.purpose}</span></span>
        ${b.fee ? `<span><strong>預計報價</strong> <span style="font-weight:800; color:#000;">$${b.fee}</span></span>` : ''}
      `;
    } else {
      document.getElementById('bookingDetails').innerHTML = `<p style="text-align:center;">尚無最新預約資料。</p>`;
    }
  </script>
</body>
</html>
