<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>專屬預約服務 | Modern Booking</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="專屬預約">

  <style>
    :root {
      --bg-color: #F7F7F7; --text-color: #111111; --card-bg-color: #FFFFFF;
      --form-border-color: #E0E0E0; --accent-color: #000000; --gray-text: #767676;
      --disabled-text: #CCCCCC; --submit-btn-bg: #000000; --submit-btn-text: #FFFFFF;
      --status-pending: #888888; --status-accepted: #000000; --status-rejected: #DDDDDD;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; display: flex; justify-content: center; padding: 80px 20px; position: relative; -webkit-tap-highlight-color: transparent;}
    .history-toggle-btn { position: absolute; top: 30px; right: 40px; background: transparent; border: 1px solid var(--text-color); color: var(--text-color); padding: 8px 20px; border-radius: 4px; font-size: 13px; font-weight: 500; letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease; z-index: 10; }
    .history-toggle-btn:hover { background: var(--text-color); color: #fff; }
    .content-wrapper { background-color: var(--card-bg-color); max-width: 520px; width: 100%; padding: 60px 50px; border-radius: 8px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0,0,0,0.02); animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    header { margin-bottom: 50px; text-align: left; }
    h1 { font-size: 28px; font-weight: 600; letter-spacing: 1px; margin-bottom: 8px; color: var(--text-color); }
    p.subtitle { color: var(--gray-text); font-size: 14px; }
    header::after { content: ''; display: block; width: 100%; height: 2px; background-color: var(--text-color); margin-top: 24px; }
    .form-group { margin-bottom: 40px; }
    label.section-title { display: block; font-size: 13px; font-weight: 600; margin-bottom: 16px; letter-spacing: 1px; color: var(--gray-text);}
    input[type="text"], select { width: 100%; padding: 16px 16px; font-size: 15px; border: 1px solid var(--form-border-color); border-radius: 4px; outline: none; background-color: #FAFAFA; transition: all 0.3s ease; font-family: inherit; color: var(--text-color); }
    input[type="text"]:focus, select:focus { border-color: var(--accent-color); background-color: #fff; box-shadow: 0 0 0 1px var(--accent-color); }
    select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23000000' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 16px center; background-size: 16px; cursor: pointer; }
    .dropdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 600; font-size: 16px; letter-spacing: 1px;}
    .calendar-nav { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-color); padding: 4px 8px; transition: transform 0.2s;}
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
    .calendar-day-name { font-size: 12px; font-weight: 500; color: var(--gray-text); margin-bottom: 8px;}
    .calendar-date { padding: 12px 0; font-size: 14px; border-radius: 4px; cursor: pointer; transition: all 0.2s ease; border: 1px solid transparent; background: #FAFAFA;}
    .calendar-date.selected { background-color: var(--accent-color); color: #fff; font-weight: 600;}
    .calendar-date.disabled { color: var(--disabled-text); background: transparent; cursor: not-allowed; }
    .calendar-date.empty { background: transparent; cursor: default; }
    .purpose-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .option-btn { appearance: none; background: transparent; border: 1px solid var(--form-border-color); border-radius: 4px; padding: 14px 12px; font-size: 14px; color: var(--text-color); cursor: pointer; text-align: center; transition: all 0.2s ease; font-weight: 500;}
    .option-btn.selected { background-color: var(--accent-color); color: #fff; }
    .custom-purpose { margin-top: 16px; display: none; overflow: hidden; }
    .custom-purpose.active { display: block; animation: expandDown 0.3s ease forwards; }
    #eggplantWrapper { background: #FAFAFA; padding: 24px; border-radius: 4px; border: 1px solid var(--form-border-color); margin-top: 16px;}
    @keyframes expandDown { from { opacity: 0; transform: translateY(-5px); max-height: 0; } to { opacity: 1; transform: translateY(0); max-height: 500px; } }
    @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .submit-btn { width: 100%; padding: 20px; background: var(--submit-btn-bg); color: var(--submit-btn-text); border: none; border-radius: 4px; font-size: 16px; font-weight: 600; letter-spacing: 2px; cursor: pointer; margin-top: 20px; transition: all 0.3s ease; }
    .submit-btn:disabled { background: #888; cursor: not-allowed; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background-color: var(--text-color); color: #FFF; padding: 14px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; opacity: 0; pointer-events: none; transition: all 0.3s ease; z-index: 9999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
    .modal-overlay.active { display: flex; }
    .modal-content { background: #fff; width: 90%; max-width: 480px; padding: 40px; border-radius: 8px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.1); position: relative; border: 1px solid var(--form-border-color);}
    .close-modal { position: absolute; top: 20px; right: 24px; background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--gray-text); }
    .history-card { border: 1px solid var(--form-border-color); padding: 20px; border-radius: 4px; margin-bottom: 16px; }
    .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #EEEEEE; padding-bottom: 12px;}
    .status-badge { padding: 4px 10px; border-radius: 2px; font-size: 12px; font-weight: 600; color: #fff;}
    .status-pending { background-color: var(--status-pending); }
    .status-accepted { background-color: var(--status-accepted); }
    .status-rejected { background-color: #DDDDDD; color: #767676; }
    .reject-reason-box { margin-top: 12px; padding-top: 12px; border-top: 1px dashed #E0E0E0; color: #767676; font-size: 13px; }
  </style>
</head>
<body>

  <div id="toast" class="toast"></div>
  <button class="history-toggle-btn" id="openHistoryBtn">預約紀錄</button>

  <div class="content-wrapper">
    <header>
      <h1>專屬預約服務</h1>
      <p class="subtitle">請填寫下方資訊，我們將盡快為您審核安排。</p>
    </header>

    <form id="bookingForm">
      <div class="form-group"><label class="section-title">01. 預約人姓名</label><input type="text" id="userName" placeholder="請輸入全名" required></div>
      <div class="form-group"><label class="section-title">02. 聯絡方式</label><input type="text" id="contactInfo" placeholder="LINE ID 或 手機號碼" required></div>
      <div class="form-group"><label class="section-title">03. 選擇日期</label>
        <div class="calendar-header"><button type="button" class="calendar-nav" id="prevMonth">&lt;</button><div id="monthYearDisplay"></div><button type="button" class="calendar-nav" id="nextMonth">&gt;</button></div>
        <div class="calendar-grid" id="calendarDays"><div class="calendar-day-name">日</div><div class="calendar-day-name">一</div><div class="calendar-day-name">二</div><div class="calendar-day-name">三</div><div class="calendar-day-name">四</div><div class="calendar-day-name">五</div><div class="calendar-day-name">六</div></div>
        <div class="calendar-grid" id="calendarDates"></div><input type="hidden" id="selectedDate" required>
      </div>
      <div class="form-group"><label class="section-title">04. 選擇時間與預計時長</label><div class="dropdown-grid"><select id="timeSelect" required><option value="" disabled selected>選擇時段</option></select><select id="durationSelect" required><option value="" disabled selected>選擇時長</option><option value="30分鐘">30 分鐘</option><option value="1小時">1 小時</option><option value="1.5小時">1.5 小時</option><option value="2小時">2 小時</option><option value="2.5小時">2.5 小時</option><option value="3小時">3 小時</option><option value="3.5小時">3.5 小時</option><option value="4小時">4 小時</option><option value="4小時以上">4 小時以上</option></select></div></div>
      <div class="form-group"><label class="section-title">05. 預約服務項目</label>
        <div class="purpose-grid" id="purposeContainer"><button type="button" class="option-btn purpose-btn" data-value="作業討論">作業討論</button><button type="button" class="option-btn purpose-btn" data-value="食物外送">食物外送</button><button type="button" class="option-btn purpose-btn" data-value="工作幫手">工作幫手</button><button type="button" class="option-btn purpose-btn" data-value="跑腿代買">跑腿代買</button><button type="button" class="option-btn purpose-btn" data-value="陪伴聊天">陪伴聊天</button><button type="button" class="option-btn purpose-btn special-btn" data-value="🍆 特殊專案" style="font-weight:bold;">🍆 特殊專案</button><button type="button" class="option-btn purpose-btn" data-value="其他" id="otherBtn" style="grid-column: span 2;">其他需求</button></div>
        <div class="custom-purpose" id="eggplantWrapper">
          <label class="section-title" style="margin-top: 0; margin-bottom: 8px; color: var(--accent-color); border:none;">進階專屬項目</label>
          <p style="font-size:12px; color:var(--text-color); margin-bottom:12px; font-weight:600;">※ 此為付費解鎖項目 (最低 $200 起)</p>
          <div class="purpose-grid" style="margin-bottom: 16px;"><button type="button" class="option-btn sub-purpose-btn" data-value="撫摸">撫摸</button><button type="button" class="option-btn sub-purpose-btn" data-value="聞香">聞香</button><button type="button" class="option-btn sub-purpose-btn" data-value="觀賞">觀賞</button><button type="button" class="option-btn sub-purpose-btn" data-value="把玩">把玩</button><button type="button" class="option-btn sub-purpose-btn" data-value="深入交流">深入交流</button></div>
          <select id="specialFeeSelect"><option value="" disabled selected>請選擇預計支付費用</option></select>
        </div>
        <div class="custom-purpose" id="customPurposeWrapper"><input type="text" id="customPurposeInput" placeholder="請簡述您的需求細節..."></div>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">送出預約申請</button>
    </form>
  </div>

  <div class="modal-overlay" id="historyModal">
    <div class="modal-content"><button class="close-modal" id="closeHistoryBtn">&times;</button><h2 style="font-size: 22px; font-weight: 600; margin-bottom: 24px; border-bottom: 2px solid var(--accent-color); padding-bottom: 12px; display:inline-block;">歷史預約紀錄</h2><div id="historyList"></div></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDoc, doc, query, where, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDhiPBUAghmIW9gSIORULpc4Oe5weQKzfk",
      authDomain: "premium-booking-65161.firebaseapp.com",
      projectId: "premium-booking-65161",
      storageBucket: "premium-booking-65161.firebasestorage.app",
      messagingSenderId: "972827032736",
      appId: "1:972827032736:web:0293d80e7e8843dfb2ddc5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Toast 提示
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message; toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    // 歷史紀錄邏輯
    async function renderHistory() {
      const list = document.getElementById('historyList');
      const myIDs = JSON.parse(localStorage.getItem('myBookings')) || [];
      if(myIDs.length === 0) { list.innerHTML = '<p style="color: #999; text-align:center; padding: 40px 0;">目前尚無任何紀錄。</p>'; return; }
      
      list.innerHTML = '<p style="text-align:center; padding:20px;">讀取中...</p>';
      let html = '';
      
      for (const id of myIDs.reverse()) {
        const docRef = doc(db, "bookings", id);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
          const b = docSnap.data();
          let sText, sClass;
          if(b.status === 'pending') { sText = '審核中'; sClass = 'status-pending'; }
          else if(b.status === 'accepted') { sText = '已接受'; sClass = 'status-accepted'; }
          else if(b.status === 'rejected') { sText = '未通過'; sClass = 'status-rejected'; }
          let rReason = (b.status === 'rejected' && b.rejectReason) ? `<div class="reject-reason-box"><strong>婉拒原因：</strong>${b.rejectReason}</div>` : '';
          html += `<div class="history-card"><div class="history-header"><span style="font-weight:600;">${b.date} ${b.time}</span><span class="status-badge ${sClass}">${sText}</span></div><div style="font-size: 14px; color: #333; margin-top: 8px;"><div><strong>項目：</strong> ${b.purpose}</div>${b.fee ? `<strong>報價：</strong>$${b.fee}` : ''} ${rReason} </div></div>`;
        }
      }
      list.innerHTML = html || '<p style="text-align:center; padding:20px;">紀錄已失效或被刪除。</p>';
    }

    document.getElementById('openHistoryBtn').onclick = () => { renderHistory(); document.getElementById('historyModal').classList.add('active'); };
    document.getElementById('closeHistoryBtn').onclick = () => document.getElementById('historyModal').classList.remove('active');

    // 日曆邏輯
    const calendarDates = document.getElementById('calendarDates'), monthYearDisplay = document.getElementById('monthYearDisplay'), prevMonthBtn = document.getElementById('prevMonth'), nextMonthBtn = document.getElementById('nextMonth'), selectedDateInput = document.getElementById('selectedDate');
    let currentDate = new Date(), currentMonth = currentDate.getMonth(), currentYear = currentDate.getFullYear(); const today = new Date(); today.setHours(0, 0, 0, 0);
    
    function renderCalendar(month, year) {
      calendarDates.innerHTML = ''; const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
      monthYearDisplay.textContent = `${year} 年 ${month + 1} 月`;
      prevMonthBtn.disabled = (year === today.getFullYear() && month === today.getMonth());
      for (let i = 0; i < firstDay; i++) { const d = document.createElement('div'); d.className = 'calendar-date empty'; calendarDates.appendChild(d); }
      for (let i = 1; i <= daysInMonth; i++) {
        const d = document.createElement('div'); d.className = 'calendar-date'; d.textContent = i; const fDate = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
        if (new Date(year, month, i) < today) d.classList.add('disabled');
        else d.onclick = function() { document.querySelectorAll('.calendar-date').forEach(el => el.classList.remove('selected')); this.classList.add('selected'); selectedDateInput.value = fDate; };
        calendarDates.appendChild(d);
      }
    }
    renderCalendar(currentMonth, currentYear);
    prevMonthBtn.onclick = () => { currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} renderCalendar(currentMonth, currentYear); };
    nextMonthBtn.onclick = () => { currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} renderCalendar(currentMonth, currentYear); };

    // 下拉選單生成
    const timeSelect = document.getElementById('timeSelect'); for (let h = 0; h < 24; h++) for (let m = 0; m < 60; m += 30) { let hh=String(h).padStart(2,'0'), mm=String(m).padStart(2,'0'); timeSelect.appendChild(new Option(`${hh}:${mm}`, `${hh}:${mm}`)); }
    const feeSelect = document.getElementById('specialFeeSelect'); for (let a = 200; a <= 4000; a += 200) feeSelect.appendChild(new Option(`$${a}`, a));

    // 選項互動
    const purposeBtns = document.querySelectorAll('.purpose-btn'), subPurposeBtns = document.querySelectorAll('.sub-purpose-btn'), specialBtn = document.querySelector('.special-btn'), otherBtn = document.getElementById('otherBtn'), eggplantWrapper = document.getElementById('eggplantWrapper'), customPurposeWrapper = document.getElementById('customPurposeWrapper');
    purposeBtns.forEach(btn => btn.onclick = function() {
      this.classList.toggle('selected');
      if(this.dataset.value === '其他') customPurposeWrapper.classList.toggle('active');
      if(this.dataset.value === '🍆 特殊專案') eggplantWrapper.classList.toggle('active');
    });
    subPurposeBtns.forEach(btn => btn.onclick = function() { this.classList.toggle('selected'); });

    // 表單送出
    document.getElementById('bookingForm').onsubmit = async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      let selected = []; let fee = null;
      document.querySelectorAll('.purpose-btn.selected').forEach(b => { if (b.dataset.value !== '其他' && b.dataset.value !== '🍆 特殊專案') selected.push(b.dataset.value); });
      
      if (specialBtn.classList.contains('selected')) {
        if (!feeSelect.value) { showToast("請選擇特殊專案報價"); return; }
        fee = parseInt(feeSelect.value);
        let subs = []; document.querySelectorAll('.sub-purpose-btn.selected').forEach(s => subs.push(s.dataset.value));
        selected.push(`🍆 (${subs.length>0 ? subs.join('、') : '未選擇細項'})`);
      }
      if (otherBtn.classList.contains('selected')) selected.push(`其他：${document.getElementById('customPurposeInput').value}`);
      if(!selectedDateInput.value) { showToast("請選擇日期"); return; }
      if(selected.length === 0) { showToast("請選擇服務項目"); return; }

      btn.disabled = true; btn.innerHTML = "處理中...";
      
      try {
        const docRef = await addDoc(collection(db, "bookings"), {
          name: document.getElementById('userName').value,
          contact: document.getElementById('contactInfo').value,
          date: selectedDateInput.value,
          time: timeSelect.value,
          duration: document.getElementById('durationSelect').value,
          purpose: selected.join(' | '),
          fee: fee,
          status: 'pending',
          createdAt: new Date()
        });
        
        // 紀錄這筆 ID 到本地端，方便以後查歷史紀錄
        let myBookings = JSON.parse(localStorage.getItem('myBookings')) || [];
        myBookings.push(docRef.id);
        localStorage.setItem('myBookings', JSON.stringify(myBookings));
        localStorage.setItem('lastBookingID', docRef.id); // 給成功頁面用

        window.location.href = 'success.html';
      } catch (e) {
        showToast("伺服器連線失敗，請稍後再試");
        btn.disabled = false; btn.innerHTML = "送出預約申請";
      }
    };
  </script>
</body>
</html>
