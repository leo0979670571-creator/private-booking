<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>管理控制台</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    :root {
      --bg-color: #F7F7F7; --text-color: #111111; --card-bg-color: #FFFFFF;
      --form-border-color: #E0E0E0; --accent-color: #000000; 
      --gray-text: #767676; --status-pending: #888888;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background-color: var(--bg-color); color: var(--text-color); 
      line-height: 1.6; -webkit-tap-highlight-color: transparent;
      padding-bottom: env(safe-area-inset-bottom);
    }
    
    /* 密碼驗證 */
    #loginOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: #FFFFFF; z-index: 10000; display: flex; 
      flex-direction: column; justify-content: center; align-items: center;
    }
    .login-box { width: 80%; max-width: 300px; text-align: center; }
    .login-box h2 { font-size: 14px; letter-spacing: 3px; margin-bottom: 30px; color: var(--gray-text); font-weight: 700; }
    .login-box input { width: 100%; padding: 18px; border: 1px solid var(--form-border-color); border-radius: 2px; text-align: center; font-size: 24px; letter-spacing: 8px; outline: none; margin-bottom: 24px; background: #FAFAFA; font-family: monospace;}
    .login-box button { width: 100%; padding: 18px; background: #000; color: #fff; border: none; border-radius: 2px; font-weight: 700; letter-spacing: 2px; cursor: pointer; font-size: 15px;}

    /* 佈局調整：垂直堆疊 */
    .admin-container { 
      display: flex; flex-direction: column; 
      gap: 30px; max-width: 800px; width: 100%; 
      margin: 0 auto; padding: 60px 20px;
    }

    /* 頂部 Header */
    .admin-header { text-align: left; margin-bottom: 10px; }
    .admin-header h1 { font-size: 24px; font-weight: 800; letter-spacing: 2px; }
    .admin-header p { font-size: 12px; color: #777; letter-spacing: 1px; margin-top: 5px; }

    /* 上方：最新動態區塊 */
    .details-section { width: 100%; display: flex; flex-direction: column; gap: 15px; order: 1; }
    
    /* 下方：日曆區塊 */
    .calendar-section { 
      background-color: var(--card-bg-color); width: 100%; 
      padding: 30px; border-radius: 4px; border: 1px solid var(--form-border-color);
      box-shadow: 0 10px 30px rgba(0,0,0,0.02); order: 2; 
    }

    .panel-title { 
      font-size: 15px; font-weight: 800; margin-bottom: 20px; 
      display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #000; 
      padding-bottom: 12px; letter-spacing: 1px;
    }

    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 800; font-size: 16px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
    .calendar-date { 
      position: relative; padding: 12px 0; font-size: 14px; border-radius: 2px; 
      cursor: pointer; transition: 0.2s; background: #FAFAFA; border: 1px solid transparent; font-weight: 500;
    }
    .calendar-date.selected { background-color: #000; color: #fff; transform: scale(1.05); }
    .calendar-date.has-booking::after { 
      content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); 
      width: 4px; height: 4px; background-color: #000; border-radius: 50%; 
    }
    .calendar-date.selected.has-booking::after { background-color: #fff; }

    /* 預約卡片 */
    .booking-card { 
      background: #fff; padding: 25px; border: 1px solid var(--form-border-color); 
      border-left: 5px solid #EEE; position: relative; animation: slideUp 0.4s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .booking-card.pending { border-left-color: #888; border-left-style: dashed; }
    .booking-card.special { border-left-color: #000; border-left-style: solid; border-left-width: 8px;}

    .delete-btn { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #CCC; background: none; border: none; font-size: 24px; padding: 10px; }
    
    /* 🔥 修正：凸顯日期與時間 */
    .booking-datetime { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: #000; display: flex; align-items: baseline; flex-wrap: wrap; gap: 8px; border-bottom: 1px dashed #EEE; padding-bottom: 10px;}
    .booking-duration { font-size: 13px; color: #777; font-weight: 500;}

    .contact-badge { background: #000; color: #fff; padding: 3px 10px; border-radius: 2px; font-size: 11px; margin-left: 10px; font-weight: 600; vertical-align: middle;}
    .booking-purpose { background: #F8F8F8; padding: 15px; border-radius: 2px; margin-top: 15px; border: 1px solid #EEE; font-size: 14px; line-height: 1.5; color: #222;}

    .action-buttons { display: flex; gap: 10px; margin-top: 25px; }
    .btn { flex: 1; padding: 16px; border-radius: 2px; cursor: pointer; font-weight: 700; border: none; font-size: 14px; letter-spacing: 2px;}
    .btn-accept { background: #000; color: #fff; }
    .btn-reject { background: #fff; border: 1px solid #CCC; color: #444; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); justify-content: center; align-items: center; z-index: 11000; padding: 20px; backdrop-filter: blur(10px); }
    .modal-overlay.active { display: flex; }
    .modal-content { background: #fff; padding: 35px; border: 3px solid #000; width: 100%; max-width: 400px; }
  </style>
</head>
<body>

  <div id="loginOverlay">
    <div class="login-box">
      <h2>管理員登入</h2>
      <input type="password" id="adminPass" placeholder="••••" maxlength="4" inputmode="numeric">
      <button onclick="checkPass()">登入系統</button>
    </div>
  </div>

  <div class="admin-container">
    <header class="admin-header">
      <h1>管理控制台</h1>
      <p>私人預約審核中心</p>
    </header>

    <div class="details-section" id="bookingDetailsPanel">
      <p style="color:#999; text-align:center; padding:40px 0; font-size: 13px; letter-spacing: 2px;">同步雲端資料庫中...</p>
    </div>

    <div class="calendar-section">
      <div id="monthDisplay" style="font-weight:800; margin-bottom:15px; font-size: 18px; border-left: 4px solid #000; padding-left: 15px;"></div>
      <div class="calendar-grid" id="calendarDates"></div>
      <p style="font-size: 12px; color: #999; margin-top: 20px; text-align: center; letter-spacing: 1px;">點擊上方日期，可篩選該日預約紀錄</p>
    </div>
  </div>

  <div class="modal-overlay" id="rejectModal">
    <div class="modal-content">
      <h3 style="font-size: 18px; font-weight: 800; margin-bottom: 15px;">婉拒預約理由</h3>
      <input type="text" id="rejectReason" style="width:100%; padding:16px; margin-bottom:25px; border:1px solid #CCC; outline:none; font-size: 14px;" placeholder="例如：該時段已被預約...">
      <div style="display:flex; gap:10px;">
        <button class="btn btn-reject" onclick="document.getElementById('rejectModal').classList.remove('active')">取消</button>
        <button class="btn btn-accept" id="confirmRejectBtn">確認送出</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDhiPBUAghmIW9gSIORULpc4Oe5weQKzfk",
      authDomain: "premium-booking-65161.firebaseapp.com",
      projectId: "premium-booking-65161",
      storageBucket: "premium-booking-65161.firebasestorage.app",
      messagingSenderId: "972827032736",
      appId: "1:972827032736:web:0293d80e7e8843dfb2ddc5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allBookings = [];
    let selectedDate = null;

    // 登入驗證
    window.checkPass = function() {
      const pass = document.getElementById('adminPass').value;
      if(pass === '0000') { document.getElementById('loginOverlay').style.display = 'none'; } 
      else { alert('密碼錯誤，請重新輸入。'); }
    };

    // 監聽雲端資料
    onSnapshot(query(collection(db, "bookings"), orderBy("createdAt", "desc")), (snapshot) => {
      allBookings = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderCalendar();
      renderPanel();
    });

    // 渲染日曆
    function renderCalendar() {
      const grid = document.getElementById('calendarDates'); grid.innerHTML = '';
      const now = new Date();
      document.getElementById('monthDisplay').innerText = `${now.getFullYear()} 年 ${now.getMonth()+1} 月`;
      const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
      for(let i=1; i<=days; i++) {
        const d = document.createElement('div');
        const fDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        d.className = 'calendar-date'; d.innerText = i;
        if (allBookings.some(b => b.date === fDate && b.status !== 'rejected')) d.classList.add('has-booking');
        if (selectedDate === fDate) d.classList.add('selected');
        d.onclick = () => { 
          selectedDate = (selectedDate === fDate) ? null : fDate; 
          renderCalendar(); renderPanel(); 
        };
        grid.appendChild(d);
      }
    }

    // 渲染預約卡片
    function renderPanel() {
      const panel = document.getElementById('bookingDetailsPanel');
      let displayList = selectedDate ? allBookings.filter(b => b.date === selectedDate) : allBookings.slice(0, 10);
      let html = `<h2 class="panel-title">${selectedDate ? selectedDate + ' 的行程' : '最新預約動態'}</h2>`;
      
      if(displayList.length === 0) {
        html += '<p style="color:#999; padding:40px 0; text-align:center; font-size:14px;">目前尚無相關紀錄</p>';
      } else {
        displayList.forEach(b => {
          const isPending = b.status === 'pending';
          
          // 狀態轉換中文
          let statusText = '';
          if(b.status === 'accepted') statusText = '已接受';
          else if(b.status === 'rejected') statusText = '已婉拒';
          else statusText = '審核中';

          html += `
            <div class="booking-card ${isPending ? 'pending' : ''} ${b.fee ? 'special' : ''}">
              <button class="delete-btn" onclick="window.delBooking('${b.id}')">×</button>
              
              <div class="booking-datetime">
                <span>${b.date}</span>
                <span>${b.time}</span>
                <span class="booking-duration">/ 共 ${b.duration}</span>
              </div>
              
              <div style="font-size:16px; font-weight:800;">${b.name} <span class="contact-badge">${b.contact}</span></div>
              ${b.fee ? `<div style="font-weight:900; margin-top:12px; font-size:20px; border-top:1px solid #EEE; padding-top:10px;">$${b.fee}</div>` : ''}
              <div class="booking-purpose">${b.purpose}</div>
              
              ${isPending ? `
                <div class="action-buttons">
                  <button class="btn btn-accept" onclick="window.updateStatus('${b.id}', 'accepted')">接受</button>
                  <button class="btn btn-reject" onclick="window.askReject('${b.id}')">婉拒</button>
                </div>
              ` : `<div style="text-align:right; font-size:13px; margin-top:20px; font-weight:900; color:#000;">● ${statusText}</div>`}
            </div>
          `;
        });
      }
      panel.innerHTML = html;
    }

    // 更新狀態 (接受/婉拒)
    window.updateStatus = async (id, status, reason = "") => {
      await updateDoc(doc(db, "bookings", id), { status, rejectReason: reason });
    };

    // 刪除紀錄
    window.delBooking = async (id) => {
      if(confirm("確定要永久刪除此筆紀錄嗎？")) await deleteDoc(doc(db, "bookings", id));
    };

    // 彈出婉拒視窗
    window.askReject = (id) => {
      const modal = document.getElementById('rejectModal');
      modal.classList.add('active');
      document.getElementById('confirmRejectBtn').onclick = () => {
        const reason = document.getElementById('rejectReason').value || "抱歉，目前時段不便安排。";
        window.updateStatus(id, 'rejected', reason);
        modal.classList.remove('active');
        document.getElementById('rejectReason').value = ""; // 清空輸入框
      };
    };
  </script>
</body>
</html>
