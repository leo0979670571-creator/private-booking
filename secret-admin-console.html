<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>後台管理系統 | Admin Cloud</title>
  <style>
    :root { --bg-color: #F7F7F7; --text-color: #111111; --card-bg-color: #FFFFFF; --form-border-color: #E0E0E0; --accent-color: #000000; --gray-text: #767676; }
    body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; padding: 60px 20px; }
    .admin-container { display: flex; gap: 40px; max-width: 1000px; width: 100%; align-items: flex-start; }
    .calendar-section { background: #fff; flex: 0 0 380px; padding: 40px; border-radius: 8px; border: 1px solid #E0E0E0; position: sticky; top: 20px; }
    .details-section { flex: 1; display: flex; flex-direction: column; gap: 20px; }
    .booking-card { background: #fff; padding: 28px; border-radius: 8px; border: 1px solid #E0E0E0; border-left: 5px solid #E0E0E0; position: relative; }
    .booking-card.pending { border-left-color: #888; border-left-style: dashed; }
    .booking-card.special { border-left-color: #000; border-left-style: solid; }
    .delete-btn { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #ccc; background:none; border:none; font-size:18px; }
    .booking-time { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
    .contact-badge { background: #000; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-left: 10px; }
    .booking-purpose { background: #F9F9F9; padding: 15px; border-radius: 4px; margin-top: 15px; border: 1px solid #EEE; }
    .action-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .btn { flex: 1; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: 600; border: none; }
    .btn-accept { background: #000; color: #fff; }
    .btn-reject { background: #fff; border: 1px solid #CCC; color: #666; }
    
    /* 日曆小點 */
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-top: 20px; }
    .calendar-date { padding: 10px 0; border-radius: 4px; cursor: pointer; position: relative; font-size: 13px; }
    .calendar-date.selected { background: #000; color: #fff; }
    .calendar-date.has-booking::after { content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #000; border-radius: 50%; }
    .calendar-date.selected.has-booking::after { background: #fff; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); justify-content: center; align-items: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: #fff; padding: 30px; border-radius: 8px; border: 1px solid #000; width: 400px; }
  </style>
</head>
<body>

  <div class="admin-container">
    <div class="calendar-section">
      <h2 style="font-size: 20px; margin-bottom: 20px;">管理中心 (Cloud)</h2>
      <div id="monthDisplay" style="font-weight:600; margin-bottom:10px;"></div>
      <div class="calendar-grid" id="calendarDates"></div>
    </div>
    <div class="details-section" id="bookingDetailsPanel">
      <p style="color:#999; text-align:center; padding-top:100px;">正在監聽雲端預約...</p>
    </div>
  </div>

  <div class="modal-overlay" id="rejectModal">
    <div class="modal-content">
      <h3>婉拒預約</h3>
      <input type="text" id="rejectReason" style="width:100%; padding:10px; margin:20px 0;" placeholder="輸入婉拒原因...">
      <div style="display:flex; gap:10px;">
        <button class="btn btn-reject" onclick="document.getElementById('rejectModal').classList.remove('active')">取消</button>
        <button class="btn btn-accept" id="confirmRejectBtn">確認</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDhiPBUAghmIW9gSIORULpc4Oe5weQKzfk",
      authDomain: "premium-booking-65161.firebaseapp.com",
      projectId: "premium-booking-65161",
      storageBucket: "premium-booking-65161.firebasestorage.app",
      messagingSenderId: "972827032736",
      appId: "1:972827032736:web:0293d80e7e8843dfb2ddc5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allBookings = [];
    let selectedDate = null;

    // 即時監聽雲端資料
    const q = query(collection(db, "bookings"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
      allBookings = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderCalendar();
      renderPanel();
    });

    function renderCalendar() {
      const grid = document.getElementById('calendarDates');
      grid.innerHTML = '';
      const now = new Date();
      document.getElementById('monthDisplay').innerText = `${now.getFullYear()} 年 ${now.getMonth()+1} 月`;
      const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
      
      for(let i=1; i<=days; i++) {
        const d = document.createElement('div');
        const fDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        d.className = 'calendar-date';
        d.innerText = i;
        if (allBookings.some(b => b.date === fDate && b.status !== 'rejected')) d.classList.add('has-booking');
        if (selectedDate === fDate) d.classList.add('selected');
        d.onclick = () => { selectedDate = fDate; renderCalendar(); renderPanel(); };
        grid.appendChild(d);
      }
    }

    function renderPanel() {
      const panel = document.getElementById('bookingDetailsPanel');
      let displayList = selectedDate ? allBookings.filter(b => b.date === selectedDate) : allBookings.slice(0, 5);
      
      let html = `<h2 style="font-size:18px; border-bottom:2px solid #000; padding-bottom:10px;">${selectedDate ? selectedDate + ' 的預約' : '最新動態'}</h2>`;
      
      if(displayList.length === 0) {
        html += '<p style="color:#999; padding:40px 0; text-align:center;">尚無預約</p>';
      } else {
        displayList.forEach(b => {
          const isPending = b.status === 'pending';
          html += `
            <div class="booking-card ${isPending ? 'pending' : ''} ${b.fee ? 'special' : ''}">
              <button class="delete-btn" onclick="window.delBooking('${b.id}')">✕</button>
              <div class="booking-time">${b.time} <span style="font-size:14px; color:#888;">(${b.duration})</span></div>
              <div style="font-weight:600;">${b.name} <span class="contact-badge">${b.contact}</span></div>
              ${b.fee ? `<div style="color:#000; font-weight:700; margin-top:10px;">預計報價：$${b.fee}</div>` : ''}
              <div class="booking-purpose">${b.purpose}</div>
              ${isPending ? `
                <div class="action-buttons">
                  <button class="btn btn-accept" onclick="window.updateStatus('${b.id}', 'accepted')">接受申請</button>
                  <button class="btn btn-reject" onclick="window.askReject('${b.id}')">婉拒</button>
                </div>
              ` : `<div style="text-align:right; font-size:12px; margin-top:15px; font-weight:700;">● ${b.status === 'accepted' ? '已接受' : '已婉拒'}</div>`}
            </div>
          `;
        });
      }
      panel.innerHTML = html;
    }

    window.updateStatus = async (id, status, reason = "") => {
      await updateDoc(doc(db, "bookings", id), { status, rejectReason: reason });
    };

    window.delBooking = async (id) => {
      if(confirm("確定永久刪除？")) await deleteDoc(doc(db, "bookings", id));
    };

    window.askReject = (id) => {
      const modal = document.getElementById('rejectModal');
      modal.classList.add('active');
      document.getElementById('confirmRejectBtn').onclick = () => {
        const reason = document.getElementById('rejectReason').value || "抱歉，該時段目前無法提供服務。";
        window.updateStatus(id, 'rejected', reason);
        modal.classList.remove('active');
      };
    };
  </script>
</body>
</html>
