<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>專屬預約服務 | Modern Booking</title>
  
  <meta name="robots" content="noindex, nofollow">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="專屬預約">

  <style>
    :root {
      --bg-color: #F7F7F7; --text-color: #111111; --card-bg-color: #FFFFFF;
      --form-border-color: #E0E0E0; --accent-color: #000000; --gray-text: #767676;
      --disabled-text: #CCCCCC; --submit-btn-bg: #000000; --submit-btn-text: #FFFFFF;
      --status-pending: #888888; --status-accepted: #000000; --status-rejected: #DDDDDD;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; display: flex; justify-content: center; padding: 80px 20px; position: relative; -webkit-tap-highlight-color: transparent;}
    
    .history-toggle-btn { position: absolute; top: 30px; right: 40px; background: transparent; border: 1px solid var(--text-color); color: var(--text-color); padding: 8px 20px; border-radius: 4px; font-size: 13px; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease; z-index: 10; }
    .history-toggle-btn:hover { background: var(--text-color); color: #fff; }

    .content-wrapper { background-color: var(--card-bg-color); max-width: 520px; width: 100%; padding: 60px 50px; border-radius: 4px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.05); animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1); }

    header { margin-bottom: 50px; text-align: left; }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; color: var(--text-color); }
    p.subtitle { color: var(--gray-text); font-size: 14px; letter-spacing: 1px; }
    header::after { content: ''; display: block; width: 100%; height: 3px; background-color: var(--text-color); margin-top: 24px; }

    .form-group { margin-bottom: 40px; }
    label.section-title { display: block; font-size: 12px; font-weight: 700; margin-bottom: 16px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray-text);}

    input[type="text"], select { width: 100%; padding: 16px; font-size: 15px; border: 1px solid var(--form-border-color); border-radius: 2px; outline: none; background-color: #FAFAFA; transition: all 0.2s ease; font-family: inherit; color: var(--text-color); }
    input[type="text"]:focus, select:focus { border-color: var(--accent-color); background-color: #fff; }
    select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23000000' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 16px center; background-size: 14px; cursor: pointer; }

    .dropdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 700; font-size: 15px; letter-spacing: 1px;}
    .calendar-nav { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-color); padding: 4px 12px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
    .calendar-day-name { font-size: 11px; font-weight: 700; color: var(--disabled-text); margin-bottom: 8px; text-transform: uppercase;}
    .calendar-date { padding: 12px 0; font-size: 14px; border-radius: 2px; cursor: pointer; transition: all 0.2s ease; border: 1px solid transparent; background: #FAFAFA;}
    .calendar-date.selected { background-color: var(--accent-color); color: #fff; font-weight: 700; transform: scale(1.05);}
    .calendar-date.disabled { color: var(--disabled-text); background: transparent; cursor: not-allowed; }
    .calendar-date.empty { background: transparent; cursor: default; }

    .purpose-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .option-btn { appearance: none; background: transparent; border: 1px solid var(--form-border-color); border-radius: 2px; padding: 15px 10px; font-size: 13px; color: var(--text-color); cursor: pointer; text-align: center; transition: all 0.2s ease; font-weight: 500;}
    .option-btn.selected { background-color: var(--accent-color); color: #fff; border-color: var(--accent-color); }
    
    .custom-purpose { margin-top: 16px; display: none; overflow: hidden; }
    .custom-purpose.active { display: block; animation: expandDown 0.3s ease forwards; }
    #eggplantWrapper { background: #FAFAFA; padding: 24px; border: 1px solid var(--form-border-color); margin-top: 16px;}
    
    @keyframes expandDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .submit-btn { width: 100%; padding: 22px; background: var(--submit-btn-bg); color: var(--submit-btn-text); border: none; border-radius: 2px; font-size: 15px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; margin-top: 20px; transition: all 0.3s ease; }
    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:disabled { background: #BBB; cursor: not-allowed; transform: none; }

    .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px); background-color: var(--text-color); color: #FFF; padding: 16px 28px; border-radius: 2px; font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: all 0.3s ease; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.96); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
    .modal-overlay.active { display: flex; }
    .modal-content { background: #fff; width: 90%; max-width: 480px; padding: 40px; border-radius: 2px; max-height: 85vh; overflow-y: auto; box-shadow: 0 40px 80px rgba(0,0,0,0.1); position: relative; border: 1px solid var(--form-border-color);}
    .close-modal { position: absolute; top: 20px; right: 24px; background: transparent; border: none; font-size: 28px; cursor: pointer; color: var(--text-color); }
    
    .history-card { border: 1px solid var(--form-border-color); padding: 24px; margin-bottom: 20px; }
    .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 2px solid #F0F0F0; padding-bottom: 12px;}
    .status-badge { padding: 4px 10px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #fff;}
    .status-pending { background-color: var(--status-pending); }
    .status-accepted { background-color: var(--status-accepted); }
    .status-rejected { background-color: #EEE; color: #767676; border: 1px solid #DDD;}
    .reject-reason-box { margin-top: 15px; padding: 12px; background: #F9F9F9; border-left: 3px solid #DDD; color: #767676; font-size: 13px; font-style: italic; }
  </style>
</head>
<body>

  <div id="toast" class="toast"></div>
  <button class="history-toggle-btn" id="openHistoryBtn">預約紀錄</button>

  <div class="content-wrapper">
    <header>
      <h1>專屬預約服務</h1>
      <p class="subtitle">PRIVATE APPOINTMENT SERVICE</p>
    </header>

    <form id="bookingForm">
      <div class="form-group"><label class="section-title">01. 預約人姓名</label><input type="text" id="userName" placeholder="Full Name" required></div>
      <div class="form-group"><label class="section-title">02. 聯絡方式</label><input type="text" id="contactInfo" placeholder="LINE ID / Phone" required></div>
      <div class="form-group"><label class="section-title">03. 選擇日期</label>
        <div class="calendar-header"><button type="button" class="calendar-nav" id="prevMonth">←</button><div id="monthYearDisplay"></div><button type="button" class="calendar-nav" id="nextMonth">→</button></div>
        <div class="calendar-grid" id="calendarDays"><div class="calendar-day-name">Sun</div><div class="calendar-day-name">Mon</div><div class="calendar-day-name">Tue</div><div class="calendar-day-name">Wed</div><div class="calendar-day-name">Thu</div><div class="calendar-day-name">Fri</div><div class="calendar-day-name">Sat</div></div>
        <div class="calendar-grid" id="calendarDates"></div><input type="hidden" id="selectedDate" required>
      </div>
      <div class="form-group"><label class="section-title">04. 選擇時間與時長</label><div class="dropdown-grid"><select id="timeSelect" required><option value="" disabled selected>Time</option></select><select id="durationSelect" required><option value="" disabled selected>Duration</option><option value="30分鐘">30 Mins</option><option value="1小時">1 Hour</option><option value="1.5小時">1.5 Hours</option><option value="2小時">2 Hours</option><option value="2.5小時">2.5 Hours</option><option value="3小時">3 Hours</option><option value="3.5小時">3.5 Hours</option><option value="4小時">4 Hours</option><option value="4小時以上">4+ Hours</option></select></div></div>
      <div class="form-group"><label class="section-title">05. 服務項目</label>
        <div class="purpose-grid" id="purposeContainer"><button type="button" class="option-btn purpose-btn" data-value="作業討論">作業討論</button><button type="button" class="option-btn purpose-btn" data-value="食物外送">食物外送</button><button type="button" class="option-btn purpose-btn" data-value="工作幫手">工作幫手</button><button type="button" class="option-btn purpose-btn" data-value="跑腿代買">跑腿代買</button><button type="button" class="option-btn purpose-btn" data-value="陪伴聊天">陪伴聊天</button><button type="button" class="option-btn purpose-btn special-btn" data-value="🍆 特殊專案" style="font-weight:700; border-width: 2px;">🍆 特殊專案</button><button type="button" class="option-btn purpose-btn" data-value="其他" id="otherBtn" style="grid-column: span 2;">其他需求 / OTHER</button></div>
        <div class="custom-purpose" id="eggplantWrapper">
          <label class="section-title" style="margin-top: 0; margin-bottom: 8px; color: var(--accent-color); border:none;">進階項目細節</label>
          <p style="font-size:11px; color:var(--status-pending); margin-bottom:12px; font-weight:700; letter-spacing: 1px;">※ MINIMUM $200 PER SESSION</p>
          <div class="purpose-grid" style="margin-bottom: 16px;"><button type="button" class="option-btn sub-purpose-btn" data-value="撫摸">撫摸</button><button type="button" class="option-btn sub-purpose-btn" data-value="聞香">聞香</button><button type="button" class="option-btn sub-purpose-btn" data-value="觀賞">觀賞</button><button type="button" class="option-btn sub-purpose-btn" data-value="把玩">把玩</button><button type="button" class="option-btn sub-purpose-btn" data-value="深入交流">深入交流</button></div>
          <select id="specialFeeSelect"><option value="" disabled selected>Proposed Fee / 預計支付</option></select>
        </div>
        <div class="custom-purpose" id="customPurposeWrapper"><input type="text" id="customPurposeInput" placeholder="Details of your request..."></div>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">CONFIRM & SEND</button>
    </form>
  </div>

  <div class="modal-overlay" id="historyModal">
    <div class="modal-content"><button class="close-modal" id="closeHistoryBtn">×</button><h2 style="font-size: 20px; font-weight: 700; margin-bottom: 24px; border-bottom: 4px solid var(--accent-color); padding-bottom: 8px; display:inline-block; letter-spacing: 2px;">RECORDS</h2><div id="historyList"></div></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDhiPBUAghmIW9gSIORULpc4Oe5weQKzfk",
      authDomain: "premium-booking-65161.firebaseapp.com",
      projectId: "premium-booking-65161",
      storageBucket: "premium-booking-65161.firebasestorage.app",
      messagingSenderId: "972827032736",
      appId: "1:972827032736:web:0293d80e7e8843dfb2ddc5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message; toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    async function renderHistory() {
      const list = document.getElementById('historyList');
      const myIDs = JSON.parse(localStorage.getItem('myBookings')) || [];
      if(myIDs.length === 0) { list.innerHTML = '<p style="color: #999; text-align:center; padding: 40px 0; font-size:13px;">NO BOOKINGS FOUND.</p>'; return; }
      
      list.innerHTML = '<p style="text-align:center; padding:20px; font-size:12px; color:#888;">LOADING...</p>';
      let html = '';
      
      for (const id of myIDs.reverse()) {
        const docRef = doc(db, "bookings", id);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
          const b = docSnap.data();
          let sText, sClass;
          if(b.status === 'pending') { sText = '審核中'; sClass = 'status-pending'; }
          else if(b.status === 'accepted') { sText = '已接受'; sClass = 'status-accepted'; }
          else if(b.status === 'rejected') { sText = '未通過'; sClass = 'status-rejected'; }
          let rReason = (b.status === 'rejected' && b.rejectReason) ? `<div class="reject-reason-box"><strong>婉拒原因：</strong>${b.rejectReason}</div>` : '';
          html += `<div class="history-card"><div class="history-header"><span style="font-weight:700; font-size:15px;">${b.date} ${b.time}</span><span class="status-badge ${sClass}">${sText}</span></div><div style="font-size: 13px; color: #111; margin-top: 8px;"><div><strong>項目：</strong> ${b.purpose}</div>${b.fee ? `<strong>報價：</strong>$${b.fee}` : ''} ${rReason} </div></div>`;
        }
      }
      list.innerHTML = html;
    }

    document.getElementById('openHistoryBtn').onclick = () => { renderHistory(); document.getElementById('historyModal').classList.add('active'); };
    document.getElementById('closeHistoryBtn').onclick = () => document.getElementById('historyModal').classList.remove('active');

    const calendarDates = document.getElementById('calendarDates'), monthYearDisplay = document.getElementById('monthYearDisplay'), prevMonthBtn = document.getElementById('prevMonth'), nextMonthBtn = document.getElementById('nextMonth'), selectedDateInput = document.getElementById('selectedDate');
    let currentDate = new Date(), currentMonth = currentDate.getMonth(), currentYear = currentDate.getFullYear(); const today = new Date(); today.setHours(0, 0, 0, 0);
    
    function renderCalendar(month, year) {
      calendarDates.innerHTML = ''; const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
      const monthNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
      monthYearDisplay.textContent = `${monthNames[month]} ${year}`;
      prevMonthBtn.disabled = (year === today.getFullYear() && month === today.getMonth());
      for (let i = 0; i < firstDay; i++) { const d = document.createElement('div'); d.className = 'calendar-date empty'; calendarDates.appendChild(d); }
      for (let i = 1; i <= daysInMonth; i++) {
        const d = document.createElement('div'); d.className = 'calendar-date'; d.textContent = i; const fDate = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
        if (new Date(year, month, i) < today) d.classList.add('disabled');
        else d.onclick = function() { document.querySelectorAll('.calendar-date').forEach(el => el.classList.remove('selected')); this.classList.add('selected'); selectedDateInput.value = fDate; };
        calendarDates.appendChild(d);
      }
    }
    renderCalendar(currentMonth, currentYear);
    prevMonthBtn.onclick = () => { currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} renderCalendar(currentMonth, currentYear); };
    nextMonthBtn.onclick = () => { currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} renderCalendar(currentMonth, currentYear); };

    const timeSelect = document.getElementById('timeSelect'); for (let h = 0; h < 24; h++) for (let m = 0; m < 60; m += 30) { let hh=String(h).padStart(2,'0'), mm=String(m).padStart(2,'0'); timeSelect.appendChild(new Option(`${hh}:${mm}`, `${hh}:${mm}`)); }
    const feeSelect = document.getElementById('specialFeeSelect'); for (let a = 200; a <= 4000; a += 200) feeSelect.appendChild(new Option(`$${a}`, a));

    const purposeBtns = document.querySelectorAll('.purpose-btn'), subPurposeBtns = document.querySelectorAll('.sub-purpose-btn'), specialBtn = document.querySelector('.special-btn'), otherBtn = document.getElementById('otherBtn'), eggplantWrapper = document.getElementById('eggplantWrapper'), customPurposeWrapper = document.getElementById('customPurposeWrapper');
    purposeBtns.forEach(btn => btn.onclick = function() {
      this.classList.toggle('selected');
      if(this.dataset.value === '其他') customPurposeWrapper.classList.toggle('active');
      if(this.dataset.value === '🍆 特殊專案') eggplantWrapper.classList.toggle('active');
    });
    subPurposeBtns.forEach(btn => btn.onclick = function() { this.classList.toggle('selected'); });

    document.getElementById('bookingForm').onsubmit = async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const name = document.getElementById('userName').value;
      const time = document.getElementById('timeSelect').value;
      
      let selected = []; let fee = null;
      document.querySelectorAll('.purpose-btn.selected').forEach(b => { 
        if (b.dataset.value !== '其他' && b.dataset.value !== '🍆 特殊專案') selected.push(b.dataset.value); 
      });
      
      if (specialBtn.classList.contains('selected')) {
        if (!feeSelect.value) { showToast("請選擇報價金額"); return; }
        fee = parseInt(feeSelect.value);
        let subs = []; document.querySelectorAll('.sub-purpose-btn.selected').forEach(s => subs.push(s.dataset.value));
        selected.push(`🍆 (${subs.length>0 ? subs.join('、') : '未選擇細項'})`);
      }
      if (otherBtn.classList.contains('selected')) selected.push(`其他：${document.getElementById('customPurposeInput').value}`);
      if(!selectedDateInput.value) { showToast("請選擇日期"); return; }
      if(selected.length === 0) { showToast("請選擇項目"); return; }

      btn.disabled = true; btn.innerHTML = "SENDING...";
      
      try {
        const docRef = await addDoc(collection(db, "bookings"), {
          name: name,
          contact: document.getElementById('contactInfo').value,
          date: selectedDateInput.value,
          time: time,
          duration: document.getElementById('durationSelect').value,
          purpose: selected.join(' | '),
          fee: fee,
          status: 'pending',
          createdAt: new Date()
        });
        
        // 🔥 發送手機 Bark 通知
        const barkKey = "3cz7o3uJJN74Z3ETvsq5jW";
        const title = encodeURIComponent("🔔 有新預約申請");
        const body = encodeURIComponent(`客戶：${name}\n預約時段：${time}\n項目：${selected[0]}`);
        const iconURL = "https://leo0979670571-creator.github.io/private-booking/icon-192.png";
        await fetch(`https://api.day.app/${barkKey}/${title}/${body}?icon=${iconURL}&sound=birdsong&group=Booking&isArchive=1`).catch(e => console.log(e));

        let myBookings = JSON.parse(localStorage.getItem('myBookings')) || [];
        myBookings.push(docRef.id);
        localStorage.setItem('myBookings', JSON.stringify(myBookings));
        localStorage.setItem('lastBookingID', docRef.id);

        setTimeout(() => window.location.href = 'success.html', 500);
      } catch (e) {
        showToast("連線失敗");
        btn.disabled = false; btn.innerHTML = "CONFIRM & SEND";
      }
    };

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
    }
  </script>
</body>
</html>
